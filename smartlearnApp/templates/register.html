{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Register - SmartLearn</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Raleway:wght@600;800&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <!-- <link rel="stylesheet" href="./css/register-style.css"> -->

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Open Sans", sans-serif;
            background: linear-gradient(135deg, white, white);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        /* =========================
           CARD (LOGIN / REGISTER)
        ========================= */

        .card {
            width: 100%;
            border: none !important;
            border-radius: 22px !important;
            overflow: hidden;
            background: #ffffff;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
        }

        .card-body {
            padding: 45px !important;
        }
        /* =========================
           HEADINGS
        ========================= */

        h2 {
            font-family: "Raleway", sans-serif;
            font-weight: 800;
            color: #2f5d50;
        }

        p {
            color: #777;
        }
        /* =========================
           INPUT FIELDS
        ========================= */

        .form-control {
            height: 55px;
            border-radius: 12px;
            border: 1px solid #ddd;
            transition: 0.3s;
            font-size: 15px;
        }

        .form-control:focus {
            border-color: #4CAF7D;
            box-shadow: 0 0 0 0.2rem rgba(76, 175, 125, 0.25);
        }
        /* =========================
           BUTTONS
        ========================= */

        .btn {
            font-weight: 600;
            border-radius: 12px;
            transition: 0.3s;
        }

        .btn-primary {
            background: #4CAF7D;
            border: none;
            height: 55px;
        }

        .btn-primary:hover {
            background: #3f9d70;
        }
        /* Social Buttons */

        .btn-danger {
            background: #ffffff;
            color: #444;
            border: 1px solid #ddd;
            height: 50px;
        }

        .btn-danger:hover {
            background: #f5f5f5;
        }

        .btn-dark {
            height: 50px;
        }
        /* =========================
           LINKS
        ========================= */

        a {
            color: #80d9a5;
            font-weight: 600;
            text-decoration: none;
        }

        a:hover {
            color: #2f5d50;
        }
        /* =========================
           DIVIDER
        ========================= */

        hr {
            margin: 25px 0;
            opacity: 0.2;
        }
        /* =========================
           ICONS
        ========================= */

        .text-success {
            color: #80d9a5 !important;
        }
        /* =========================
           RESPONSIVE
        ========================= */

        @media (max-width: 768px) {
            .card-body {
                padding: 30px !important;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="row justify-content-center align-items-center min-vh-100">

            <div class="col-lg-7 col-md-9">

                <div class="card shadow-lg border-0">

                    <div class="card-body p-5">
<!--                        {% if messages %}-->
<!--                            {% for message in messages %}-->
<!--                                <div class="alert alert-info">-->
<!--                                    {{ message }}-->
<!--                                </div>-->
<!--                            {% endfor %}-->
<!--                        {% endif %}-->
                        <!-- HEADER -->
                        <div class="text-center mb-4">
                            <i class="fas fa-user-plus fa-3x mb-3 text-success"></i>
                            <h2>Create Your Account</h2>
                            <p>Join SmartLearn and start learning smarter</p>
                        </div>

                        <!-- FORM -->
<!--                        <form onsubmit="register(event)">-->
                        <form method="POST">
                            {% csrf_token %}

                            <div class="row mb-3">
                                <div class="col-md-6 mb-3 mb-md-0">
<!--                                    <input type="text" class="form-control form-control-lg" placeholder="Full Name" required>-->
                                    <input type="text"
                                           name="username"
                                           class="form-control form-control-lg"
                                           placeholder="Username"
                                           required>
                                </div>
                                <div class="col-md-6">
                                    <input type="text" class="form-control form-control-lg" placeholder="Phone Number">
                                </div>
                            </div>

                            <div class="mb-3">
<!--                                <input type="email" name="email" class="form-control form-control-lg" placeholder="Email Address" required>-->
                                <input type="email"
                                       name="email"
                                       class="form-control form-control-lg"
                                       placeholder="Email Address"
                                       required>
                            </div>

                            <div class="row mb-3">
                                <div class="col-md-6 mb-3 mb-md-0">
<!--                                    <input type="password" class="form-control form-control-lg" placeholder="Password" required>-->
                                    <input type="password"
                                           name="password1"
                                           class="form-control form-control-lg"
                                           placeholder="Password"
                                           required>
                                </div>
                                <div class="col-md-6">
<!--                                    <input type="password" class="form-control form-control-lg" placeholder="Confirm Password" required>-->
                                    <input type="password"
                                           name="password2"
                                           class="form-control form-control-lg"
                                           placeholder="Confirm Password"
                                           required>
                                </div>
                            </div>

                            <!-- TERMS -->
                            <div class="form-check mb-3">
                                <input class="form-check-input" type="checkbox" required>
                                <label class="form-check-label">
                                    I agree to the Terms & Conditions
                                </label>
                            </div>

                            <!-- BUTTON -->
                            <button class="btn btn-primary w-100 btn-lg">
                                Create Account
                            </button>

                        </form>

                        <hr>

                        <!-- LOGIN LINK -->
                        <p class="text-center mb-0">
                            Already have an account?
<!--                            <a href="login.html">Login here</a>-->
                            <a href="{% url 'login' %}">Login here</a>
                        </p>

                    </div>
                </div>

            </div>

        </div>

    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>

<!--    <script>-->
<!--        function register(e) {-->
<!--            e.preventDefault();-->
<!--            alert("Register UI only");-->
<!--            window.location.href = "login.html";-->
<!--        }-->
<!--    </script>-->

<script src="{% static 'js/script.js' %}"></script>

</body>

</html>
